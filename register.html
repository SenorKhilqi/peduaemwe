<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Web Ledger SAK EMKM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #ccc;
        }

        .form-group select {
            cursor: pointer;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
            background-color: #f44336;
        }

        .strength-text {
            color: #999;
        }

        .strength-weak .strength-fill {
            width: 33%;
            background-color: #f44336;
        }

        .strength-fair .strength-fill {
            width: 66%;
            background-color: #ff9800;
        }

        .strength-good .strength-fill {
            width: 100%;
            background-color: #4caf50;
        }

        .terms-agreement {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            font-size: 13px;
            gap: 10px;
        }

        .terms-agreement input[type="checkbox"] {
            width: auto;
            margin-top: 3px;
            cursor: pointer;
        }

        .terms-agreement label {
            margin: 0;
            color: #666;
            cursor: pointer;
            flex: 1;
        }

        .terms-agreement a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .terms-agreement a:hover {
            color: #764ba2;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group.error input,
        .form-group.error select {
            border-color: #f44336;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .register-container {
                padding: 30px 20px;
            }

            .register-header h1 {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <img src="gambar/logo.png" alt="Web Ledger Logo" style="width: 60px; height: 60px; margin: 0 auto 20px; object-fit: contain;">
            <h1>Buat Akun Baru</h1>
            <p>Daftar untuk memulai menggunakan Web Ledger</p>
        </div>

        <div class="success-message" id="successMessage">
            Akun berhasil dibuat! Silahkan login dengan akun Anda.
        </div>

        <form id="registerForm">
            <!-- Nama Lengkap -->
            <div class="form-group">
                <label for="fullname">Nama Lengkap *</label>
                <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Masukkan nama lengkap" 
                    required
                >
                <div class="error-message" id="fullnameError"></div>
            </div>

            <!-- Email dan No. Telepon -->
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Masukkan email" 
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="phone">No. Telepon *</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="08..." 
                        required
                    >
                    <div class="error-message" id="phoneError"></div>
                </div>
            </div>

            <!-- Nama Perusahaan dan Jenis Industri -->
            <div class="form-row">
                <div class="form-group">
                    <label for="company">Nama Perusahaan *</label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        placeholder="Nama perusahaan" 
                        required
                    >
                    <div class="error-message" id="companyError"></div>
                </div>
                <div class="form-group">
                    <label for="industry">Jenis Industri *</label>
                    <select id="industry" name="industry" required>
                        <option value="">Pilih jenis industri</option>
                        <option value="dagang">Dagang</option>
                        <option value="jasa">Jasa</option>
                        <option value="manufaktur">Manufaktur</option>
                    </select>
                    <div class="error-message" id="industryError"></div>
                </div>
            </div>

            <!-- Password dan Konfirmasi Password -->
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Minimal 8 karakter" 
                        required
                    >
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span class="strength-text">Kekuatan password: <span id="strengthText">Lemah</span></span>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password *</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Konfirmasi password" 
                        required
                    >
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>
            </div>

            <!-- Terms & Conditions -->
            <div class="terms-agreement">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    Saya setuju dengan <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a>
                </label>
            </div>

            <button type="submit" class="register-btn">Daftar</button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const successMessage = document.getElementById('successMessage');

        // Password Strength Check
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthText = document.getElementById('strengthText');
            const strengthBar = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthBar.className = '';
                strengthText.textContent = 'Lemah';
            } else if (password.length < 8) {
                strengthBar.className = 'strength-weak';
                strengthText.textContent = 'Lemah';
            } else if (password.length < 12 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                strengthBar.className = 'strength-fair';
                strengthText.textContent = 'Sedang';
            } else {
                strengthBar.className = 'strength-good';
                strengthText.textContent = 'Kuat';
            }
        });

        // Form Validation
        function validateForm() {
            let isValid = true;
            const fields = {
                fullname: document.getElementById('fullname'),
                email: document.getElementById('email'),
                phone: document.getElementById('phone'),
                company: document.getElementById('company'),
                industry: document.getElementById('industry'),
                password: document.getElementById('password'),
                confirmPassword: document.getElementById('confirmPassword'),
                terms: document.getElementById('terms')
            };

            // Clear previous errors
            Object.keys(fields).forEach(key => {
                if (fields[key]) {
                    fields[key].parentElement.classList.remove('error');
                    const errorMsg = document.getElementById(key + 'Error');
                    if (errorMsg) errorMsg.classList.remove('show');
                }
            });

            // Validate Full Name
            if (!fields.fullname.value.trim()) {
                showError('fullname', 'Nama lengkap tidak boleh kosong');
                isValid = false;
            } else if (fields.fullname.value.trim().length < 3) {
                showError('fullname', 'Nama lengkap minimal 3 karakter');
                isValid = false;
            }

            // Validate Email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!fields.email.value.trim()) {
                showError('email', 'Email tidak boleh kosong');
                isValid = false;
            } else if (!emailRegex.test(fields.email.value.trim())) {
                showError('email', 'Format email tidak valid');
                isValid = false;
            }

            // Validate Phone
            const phoneRegex = /^(\+62|0)[0-9]{9,12}$/;
            if (!fields.phone.value.trim()) {
                showError('phone', 'No. telepon tidak boleh kosong');
                isValid = false;
            } else if (!phoneRegex.test(fields.phone.value.trim().replace(/\D/g, ''))) {
                showError('phone', 'Format no. telepon tidak valid');
                isValid = false;
            }

            // Validate Company
            if (!fields.company.value.trim()) {
                showError('company', 'Nama perusahaan tidak boleh kosong');
                isValid = false;
            }

            // Validate Industry
            if (!fields.industry.value) {
                showError('industry', 'Pilih jenis industri');
                isValid = false;
            }

            // Validate Password
            if (!fields.password.value) {
                showError('password', 'Password tidak boleh kosong');
                isValid = false;
            } else if (fields.password.value.length < 8) {
                showError('password', 'Password minimal 8 karakter');
                isValid = false;
            }

            // Validate Confirm Password
            if (!fields.confirmPassword.value) {
                showError('confirmPassword', 'Konfirmasi password tidak boleh kosong');
                isValid = false;
            } else if (fields.password.value !== fields.confirmPassword.value) {
                showError('confirmPassword', 'Password tidak cocok');
                isValid = false;
            }

            // Validate Terms
            if (!fields.terms.checked) {
                alert('Anda harus setuju dengan Syarat & Ketentuan');
                isValid = false;
            }

            return isValid;
        }

        function showError(fieldName, message) {
            const field = document.getElementById(fieldName);
            const errorMsg = document.getElementById(fieldName + 'Error');
            
            if (field) {
                field.parentElement.classList.add('error');
            }
            if (errorMsg) {
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
            }
        }

        // Form Submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            if (validateForm()) {
                // Simulate registration success
                const formData = {
                    fullname: document.getElementById('fullname').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    company: document.getElementById('company').value,
                    industry: document.getElementById('industry').value
                };

                console.log('Form Data:', formData);

                // Show success message
                successMessage.classList.add('show');

                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        });

        // Real-time email validation
        document.getElementById('email').addEventListener('blur', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (this.value && !emailRegex.test(this.value)) {
                showError('email', 'Format email tidak valid');
            }
        });

        // Real-time password confirmation check
        confirmPasswordInput.addEventListener('input', function() {
            if (this.value && passwordInput.value !== this.value) {
                document.getElementById('confirmPasswordError').textContent = 'Password tidak cocok';
                document.getElementById('confirmPasswordError').classList.add('show');
                this.parentElement.classList.add('error');
            } else if (this.value) {
                document.getElementById('confirmPasswordError').classList.remove('show');
                this.parentElement.classList.remove('error');
            }
        });
    </script>
</body>
</html>
