<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Aktivitas - Web Ledger SAK EMKM</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar-active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3B82F6;
        }
        .activity-badge-login {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        .activity-badge-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        .activity-badge-create {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
        }
        .activity-badge-update {
            background: rgba(168, 85, 247, 0.1);
            color: #7c3aed;
        }
        .activity-badge-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        .activity-badge-export {
            background: rgba(249, 115, 22, 0.1);
            color: #b45309;
        }
        table tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- HEADER -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="md:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h1 class="text-2xl font-bold text-gray-900">Laporan Aktivitas</h1>
            </div>
            <div class="flex items-center gap-4">
                <!-- User Profile -->
                <div class="flex items-center gap-3 border-l pl-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-semibold text-gray-900">Super Admin</p>
                        <p class="text-xs text-gray-500">Administrator</p>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-red-400 to-red-600 rounded-full flex items-center justify-center text-white font-bold">
                        SA
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR NAVIGATION -->
        <aside id="sidebar" class="w-64 bg-white shadow-lg overflow-y-auto transition-all duration-300 -translate-x-full md:translate-x-0 absolute md:relative h-full md:h-auto z-30 md:z-0">
            <nav class="px-4 py-6">
                <div class="flex items-center gap-2 mb-8 px-2">
                    <img src="../gambar/logo.png" alt="Web Ledger Logo" class="w-8 h-8 object-contain">
                    <span class="font-bold text-lg text-gray-900">Web Ledger</span>
                </div>

                <!-- Menu Items -->
                <div class="space-y-2">
                    <!-- Admin Dashboard Menu -->
                    <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                        </svg>
                        <span class="font-medium">Admin Dashboard</span>
                    </a>

                    <!-- Kelola User Menu -->
                    <a href="admin-manage-user.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0zM16 20a3 3 0 00-6 0m6 0H9m5-8h.01M9 16H5a2 2 0 00-2 2v1"></path>
                        </svg>
                        <span class="font-medium">Kelola User</span>
                    </a>

                    <!-- Kelola Perusahaan Menu -->
                    <a href="admin-manage-company.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path>
                        </svg>
                        <span class="font-medium">Kelola Perusahaan</span>
                    </a>

                    <!-- Kelola Role Menu -->
                    <a href="admin-manage-role.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="font-medium">Kelola Role</span>
                    </a>

                    <!-- Laporan Aktivitas Menu -->
                    <a href="admin-activity-log.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 sidebar-active hover:bg-gray-100 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <span class="font-medium">Laporan Aktivitas</span>
                    </a>

                    <!-- Pengaturan Sistem Menu -->
                    <a href="admin-settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span class="font-medium">Pengaturan Sistem</span>
                    </a>

                    <hr class="my-4">

                    <!-- Logout -->
                    <a href="../login.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        <span class="font-medium">Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-6">
                <!-- Filter Section -->
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Filter Aktivitas</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tanggal Mulai</label>
                            <input type="date" id="dateStart" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tanggal Akhir</label>
                            <input type="date" id="dateEnd" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Aktivitas</label>
                            <select id="filterActivity" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                <option value="">Semua Aktivitas</option>
                                <option value="login">Login</option>
                                <option value="logout">Logout</option>
                                <option value="create">Create</option>
                                <option value="update">Update</option>
                                <option value="delete">Delete</option>
                                <option value="export">Export</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nama User</label>
                            <input type="text" id="filterUser" placeholder="Cari nama user..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button id="btnFilter" class="px-4 py-2 bg-blue-500 text-white rounded-lg font-medium hover:bg-blue-600 transition">Filter</button>
                        <button id="btnReset" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">Reset</button>
                        <button id="btnExport" class="px-4 py-2 bg-green-500 text-white rounded-lg font-medium hover:bg-green-600 transition flex items-center gap-2 ml-auto">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                            Export
                        </button>
                    </div>
                </div>

                <!-- Activity Log Table -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-100 border-b">
                            <tr>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">No</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Waktu</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Nama User</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Perusahaan</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Aktivitas</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Deskripsi</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Status</th>
                            </tr>
                        </thead>
                        <tbody id="activityTableBody">
                            <!-- Data akan dimuat oleh JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="hidden text-center py-12">
                    <svg class="w-16 h-16 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <p class="text-gray-500">Tidak ada aktivitas ditemukan</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Mock Data
        const activities = [
            { id: 1, timestamp: '22/03/2026 14:30:45', user: 'Budi Santoso', company: 'PT. Maju Jaya', activity: 'login', description: 'Login ke sistem', status: 'success' },
            { id: 2, timestamp: '22/03/2026 14:35:12', user: 'Siti Nurhaliza', company: 'PT. Maju Jaya', activity: 'create', description: 'Membuat transaksi baru', status: 'success' },
            { id: 3, timestamp: '22/03/2026 14:45:30', user: 'Ahmad Hidayat', company: 'UD. Sejahtera', activity: 'update', description: 'Update profil perusahaan', status: 'success' },
            { id: 4, timestamp: '22/03/2026 15:00:15', user: 'Rina Wijaya', company: 'CV. Berkembang', activity: 'export', description: 'Export laporan bulanan', status: 'success' },
            { id: 5, timestamp: '22/03/2026 15:15:22', user: 'Hendra Kusuma', company: 'PT. Maju Jaya', activity: 'login', description: 'Login ke sistem', status: 'success' },
            { id: 6, timestamp: '22/03/2026 15:30:45', user: 'Lisa Maharani', company: 'UD. Sejahtera', activity: 'delete', description: 'Menghapus transaksi', status: 'failed' },
            { id: 7, timestamp: '22/03/2026 15:45:10', user: 'Bambang Irawan', company: 'PT. Maju Jaya', activity: 'create', description: 'Membuat neraca saldo', status: 'success' },
            { id: 8, timestamp: '22/03/2026 16:00:33', user: 'Dewi Lestari', company: 'CV. Berkembang', activity: 'logout', description: 'Logout dari sistem', status: 'success' },
            { id: 9, timestamp: '22/03/2026 16:15:47', user: 'Budi Santoso', company: 'PT. Maju Jaya', activity: 'update', description: 'Update data transaksi', status: 'success' },
            { id: 10, timestamp: '22/03/2026 16:30:21', user: 'Siti Nurhaliza', company: 'PT. Maju Jaya', activity: 'export', description: 'Export laporan harian', status: 'success' },
        ];

        // DOM Elements
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const btnFilter = document.getElementById('btnFilter');
        const btnReset = document.getElementById('btnReset');
        const btnExport = document.getElementById('btnExport');
        const dateStart = document.getElementById('dateStart');
        const dateEnd = document.getElementById('dateEnd');
        const filterActivity = document.getElementById('filterActivity');
        const filterUser = document.getElementById('filterUser');

        // Sidebar Toggle
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                sidebar.classList.add('-translate-x-full');
            }
        });

        // Filter Button
        btnFilter.addEventListener('click', renderTable);

        // Reset Button
        btnReset.addEventListener('click', () => {
            dateStart.value = '';
            dateEnd.value = '';
            filterActivity.value = '';
            filterUser.value = '';
            renderTable();
        });

        // Export Button
        btnExport.addEventListener('click', () => {
            let csv = 'Waktu,Nama User,Perusahaan,Aktivitas,Deskripsi,Status\n';
            const filtered = getFilteredActivities();
            filtered.forEach(activity => {
                csv += `"${activity.timestamp}","${activity.user}","${activity.company}","${activity.activity}","${activity.description}","${activity.status}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `laporan-aktivitas-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        });

        function getFilteredActivities() {
            return activities.filter(activity => {
                const activityDate = activity.timestamp.split(' ')[0];
                const start = dateStart.value ? new Date(dateStart.value).toLocaleDateString('en-CA') : '';
                const end = dateEnd.value ? new Date(dateEnd.value).toLocaleDateString('en-CA') : '';
                const activityObj = new Date(activityDate.split('/').reverse().join('-'));
                const startObj = start ? new Date(start) : null;
                const endObj = end ? new Date(end) : null;

                const matchDate = (!startObj || activityObj >= startObj) && (!endObj || activityObj <= endObj);
                const matchActivity = !filterActivity.value || activity.activity === filterActivity.value;
                const matchUser = !filterUser.value || activity.user.toLowerCase().includes(filterUser.value.toLowerCase());

                return matchDate && matchActivity && matchUser;
            });
        }

        function getActivityBadgeClass(activity) {
            const badgeMap = {
                'login': 'activity-badge-login',
                'logout': 'activity-badge-logout',
                'create': 'activity-badge-create',
                'update': 'activity-badge-update',
                'delete': 'activity-badge-delete',
                'export': 'activity-badge-export'
            };
            return badgeMap[activity] || '';
        }

        function formatActivity(activity) {
            const activityMap = {
                'login': 'Login',
                'logout': 'Logout',
                'create': 'Create',
                'update': 'Update',
                'delete': 'Delete',
                'export': 'Export'
            };
            return activityMap[activity] || activity;
        }

        function renderTable() {
            const filtered = getFilteredActivities();
            const tbody = document.getElementById('activityTableBody');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            tbody.innerHTML = filtered.map((activity, index) => `
                <tr class="border-b">
                    <td class="px-6 py-4 text-sm text-gray-700">${index + 1}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${activity.timestamp}</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${activity.user}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${activity.company}</td>
                    <td class="px-6 py-4 text-sm">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${getActivityBadgeClass(activity.activity)}">
                            ${formatActivity(activity.activity)}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-700">${activity.description}</td>
                    <td class="px-6 py-4 text-sm">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${activity.status === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${activity.status === 'success' ? 'Sukses' : 'Gagal'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // Initial Render
        renderTable();
    </script>
</body>
</html>
